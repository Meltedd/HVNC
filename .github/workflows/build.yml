name: build

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, Win32]
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -A ${{ matrix.arch }}
      - name: Build
        run: cmake --build build --config ${{ matrix.config }}
